# ai_modules/nginx.conf
# API Gateway — routes /ai/* to respective microservices

events { worker_connections 1024; }

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;

    upstream whisper  { server whisper:8001; }
    upstream rmbg     { server rmbg:8002; }
    upstream yolo     { server yolo:8003; }
    upstream beats    { server beats:8004; }
    upstream esrgan   { server esrgan:8005; }
    upstream segment  { server segment:8006; }

    # File size limits for uploads
    client_max_body_size 500M;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 30s;

    server {
        listen 80;

        # Whisper captions
        location /ai/captions/ {
            limit_req zone=upload_limit burst=3 nodelay;
            rewrite ^/ai/captions/(.*)$ /$1 break;
            proxy_pass http://whisper;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Background removal
        location /ai/rmbg/ {
            limit_req zone=upload_limit burst=3 nodelay;
            rewrite ^/ai/rmbg/(.*)$ /$1 break;
            proxy_pass http://rmbg;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Object tracking
        location /ai/tracking/ {
            limit_req zone=upload_limit burst=2 nodelay;
            rewrite ^/ai/tracking/(.*)$ /$1 break;
            proxy_pass http://yolo;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Beat detection
        location /ai/beats/ {
            limit_req zone=ai_limit burst=5 nodelay;
            rewrite ^/ai/beats/(.*)$ /$1 break;
            proxy_pass http://beats;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 4K Upscaling
        location /ai/upscale/ {
            limit_req zone=upload_limit burst=2 nodelay;
            rewrite ^/ai/upscale/(.*)$ /$1 break;
            proxy_pass http://esrgan;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Smart Cutout (SAM)
        location /ai/segment/ {
            limit_req zone=upload_limit burst=3 nodelay;
            rewrite ^/ai/segment/(.*)$ /$1 break;
            proxy_pass http://segment;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check
        location /ai/health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
