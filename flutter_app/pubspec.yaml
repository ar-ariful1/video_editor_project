name: clipcut
description: Professional video editing
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  bloc: ^9.2.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  firebase_messaging: ^16.2.0
  firebase_crashlytics: ^5.2.0
  video_player: ^2.8.2
  photo_manager: ^3.1.0
  image_picker: ^1.0.7
  just_audio: ^0.10.5
  record: ^6.2.0
  video_thumbnail: ^0.5.6
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4 
  media_kit_native_event_loop: ^1.0.8
  ffi: ^2.1.0
  dio: ^5.4.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  path: ^1.9.0
  purchases_flutter: ^10.0.0
  share_plus: ^12.0.2
  permission_handler: ^12.0.1
  open_filex: ^4.3.4
  uuid: ^4.3.3
  intl: ^0.20.2
  collection: ^1.18.0
  rxdart: ^0.28.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  go_router: ^17.2.1
  crypto: ^3.0.3
  web_socket_channel: ^3.0.3
  url_launcher: ^6.3.2
  app_links: ^6.0.0
  google_sign_in: ^6.2.1
  linked_scroll_controller: ^0.2.0
  flutter_native_splash: ^2.4.7
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/splash_logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/logo/splash_logo.png"

flutter_native_splash:
  color: "#0A0A0A"
  image: assets/logo/splash_logo.png
  android: true
  ios: true
  android_12:
    color: "#0A0A0A"
    image: assets/logo/splash_logo.png
  fullscreen: true
  
flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/images/
    - assets/animations/
    - assets/luts/
